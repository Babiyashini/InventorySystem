name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/pharmacy-app
            git pull origin main
            docker stop pharmacy-app || true
            docker rm pharmacy-app || true
            docker build -t pharmacy-system-backend .
            docker run -d --name pharmacy-app -p 5000:5000 pharmacy-system-backend
